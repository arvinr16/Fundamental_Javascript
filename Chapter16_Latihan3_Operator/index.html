<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 16 - Latihan 3 Operator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Kalkulator Aritmatika -->
    <div class="container">
      <div class="d-flex justify-content-center mt-5">
        <h1 class="text-center">Chapter 16 - Latihan 3 Operator</h1>
      </div>
    </div>
    <div class="container">
      <div class="row justify-content-center align-items-center mt-4 gap-1">
        <h2 class="text-center fs-4">Kalkulator Aritmatika</h2>
        <div class="col-2">
          <div class="input-group">
            <input
              id="aritmatikaAngka1"
              type="text"
              class="form-control input"
              placeholder="Angka-pertama"
            />
          </div>
        </div>
        <div class="col-2">
          <div class="input-group">
            <select id="operatorAritmatika" class="form-select">
              <option selected hidden>Pilih Operator</option>
              <option value="+">+</option>
              <option value="-">-</option>
              <option value="*">*</option>
              <option value="/">/</option>
              <option value="%">%</option>
            </select>
          </div>
        </div>
        <div class="col-2">
          <input
            id="aritmatikaAngka2"
            type="number"
            class="form-control input"
            placeholder="Angka-kedua"
          />
        </div>
        <div class="col-2 d-flex justify-content-center">
          <button
            type="button"
            class="btn btn-outline-primary"
            id="buttonAritmatika"
          >
            Hitung
          </button>
        </div>
        <div class="col-2 d-flex justify-content-center">
          <span id="hasilAritmatika">Hasil</span>
        </div>
      </div>
    </div>

    <!-- Kalkulator Logika -->
    <div class="container">
      <div class="row justify-content-center align-items-center mt-4 gap-1">
        <h2 class="text-center fs-4">Kalkulator Logika</h2>
        <div class="col-2">
          <div class="input-group">
            <input
              id="boolean1"
              type="text"
              class="form-control input"
              placeholder="Boolean-1"
            />
          </div>
        </div>
        <div class="col-2">
          <div class="input-group">
            <select id="operatorLogika" class="form-select">
              <option selected hidden>Pilih Operator</option>
              <option value="&&">AND</option>
              <option value="||">OR</option>
            </select>
          </div>
        </div>
        <div class="col-2">
          <input
            id="boolean2"
            type="number"
            class="form-control input"
            placeholder="Boolean-2"
          />
        </div>
        <div class="col-2 d-flex justify-content-center">
          <button
            type="button"
            class="btn btn-outline-primary"
            id="buttonLogika"
          >
            Hitung
          </button>
        </div>
        <div class="col-2 d-flex justify-content-center">
          <span id="hasilLogika">Hasil Logika</span>
        </div>
      </div>
    </div>

    <!-- Kalkulator Komparasi -->
    <div class="container">
      <div class="row justify-content-center align-items-center mt-4 gap-1">
        <h2 class="text-center fs-4">Kalkulator Komparasi</h2>
        <div class="col-2">
          <div class="input-group">
            <input
              id="komparasi1"
              type="text"
              class="form-control input"
              placeholder="Komparasi-1"
            />
          </div>
        </div>
        <div class="col-2">
          <div class="input-group">
            <select id="operatorKomparasi" class="form-select">
              <option selected hidden>Pilih Operator</option>
              <option value=">">Lebih besar dari</option>
              <option value="<">Lebih kecil dari</option>
            </select>
          </div>
        </div>
        <div class="col-2">
          <input
            id="komparasi2"
            type="number"
            class="form-control input"
            placeholder="Komparasi-2"
          />
        </div>
        <div class="col-2 d-flex justify-content-center">
          <button
            type="button"
            class="btn btn-outline-primary"
            id="buttonKomparasi"
          >
            Hitung
          </button>
        </div>
        <div class="col-2 d-flex justify-content-center">
          <span id="hasilKomparasi">Hasil Komparasi</span>
        </div>
      </div>
    </div>

    <!-- Contoh Kode Ternary Operation (recomended) -->
    <div class="container">
      <div class="row justify-content-center align-items-center mt-4 gap-1">
        <h2 class="text-center fs-4">Contoh Ternary Operation</h2>
        <div class="col-3 d-flex justify-content-center">
          <button
            type="button"
            class="btn btn-outline-primary"
            id="buttonTernary1"
          >
            Testing Ternary Operation
          </button>
        </div>
        <div class="col-2 d-flex justify-content-center">
          <span id="hasilTernary1">Hasil Ternary 1</span>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
