<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapter 19 - Latihan 4 IF Statement Kalkulator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container p-4">
      <h1 class="text-center mb-4">
        Chapter 19 - Latihan 4 IF Statement Kalkulator
      </h1>

      <div class="pb-2">
        <!-- number1 -->
        <label for="number1" class="form-label m-0 pb-1">Angka 1</label>
        <input type="number" id="number1" class="form-control" />
      </div>

      <div class="pb-2">
        <!-- operator -->
        <label class="pb-1" for="operator">Operator</label>
        <input
          type="text"
          id="operator"
          class="form-control"
          placeholder="+ - * /"
          maxlength="1"
        />
      </div>

      <div class="pb-3">
        <!-- number2 -->
        <label for="number2" class="form-label m-0 pb-1">Angka 2</label>
        <input type="number" id="number2" class="form-control" />
      </div>

      <!-- button -->
      <div class="d-flex flex-column">
        <button onclick="calculate()" class="btn btn-outline-primary mb-3">
          Hitung
        </button>
        <span id="hasil" class="text-center"></span>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="main.js"></script>
  </body>
</html>
